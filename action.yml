name: 'Qt Evolution Action'
description: 'Automatically adapt and evolve Qt code across versions'
inputs:
  path:
    description: 'Path to the code to upgrade'
    required: true
    default: '.'
  rules:
    description: 'Path to custom rules JSON5 file (optional)'
    required: false
  extensions:
    description: 'Comma-separated list of extensions to process'
    required: false
    default: '.py,.cpp,.h'

runs:
  using: 'composite'
  steps:
    - name: Set up D
      uses: dlang-community/setup-dlang@v1
      with:
        compiler: ldc-latest

    - name: Checkout upgrader
      uses: actions/checkout@v4
      with:
        repository: AMDphreak/qt-evolution-adapter
        path: qt-evolution-tool

    - name: Run qt-upgrader
      shell: bash
      run: |
        RULES_ARG=""
        if [ -n "${{ inputs.rules }}" ]; then
          RULES_ARG="--rules ${{ inputs.rules }}"
        else
          # Use default rules from the toolkit repo
          RULES_ARG="--rules-dir qt-evolution-tool/rules/qt"
        fi
        
        # Build and run from source (no Python bloat)
        cd qt-evolution-tool
        dub run -- --path "../${{ inputs.path }}" $RULES_ARG --extensions "${{ inputs.extensions }}"
