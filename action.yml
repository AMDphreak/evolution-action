name: 'Evolution Engine Action'
description: 'Generic action to evolve code using the Evolution Engine and a ruleset'

inputs:
  path:
    description: 'Path to the code to adapt'
    required: true
    default: '.'
  engine-repo:
    description: 'Repository containing the Evolution Engine'
    required: false
    default: 'AMDphreak/evolution-engine'
  engine-version:
    description: 'Version of the engine to use (tag or branch)'
    required: false
    default: 'main'
  rules-repo:
    description: 'Repository containing the ruleset'
    required: true
    default: 'AMDphreak/evolution-rules-qt'
  rules-version:
    description: 'Version of the ruleset to use'
    required: false
    default: 'main'
  rules-dir:
    description: 'Path to the rules directory within the rules-repo'
    required: false
    default: 'rules'
  from:
    description: 'Starting version'
    required: true
  to:
    description: 'Target version'
    required: true
  extensions:
    description: 'File extensions to process'
    required: false
    default: '.py,.cpp,.h'

runs:
  using: 'composite'
  steps:
    - name: Setup Dlang
      uses: dlang-community/setup-dlang@v2
      with:
        compiler: ldc-latest

    - name: Checkout Engine
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.engine-repo }}
        ref: ${{ inputs.engine-version }}
        path: evolution-engine-tool

    - name: Checkout Ruleset
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.rules-repo }}
        ref: ${{ inputs.rules-version }}
        path: evolution-rules-dir

    - name: Run Evolution Engine
      shell: bash
      run: |
        cd evolution-engine-tool
        dub run -- --path "../${{ inputs.path }}" \
                   --rules-dir "../evolution-rules-dir/${{ inputs.rules-dir }}" \
                   --from "${{ inputs.from }}" \
                   --to "${{ inputs.to }}" \
                   --extensions "${{ inputs.extensions }}" \
                   --in-place
