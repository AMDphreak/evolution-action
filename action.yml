name: 'Evolution Engine Action'
description: 'Generic action to evolve code using the Evolution Engine and a ruleset'

inputs:
  path:
    description: 'Path to the code to adapt'
    required: true
    default: '.'
  engine-repo:
    description: 'Repository containing the Evolution Engine'
    required: false
    default: 'AMDphreak/evolution-engine'
  engine-version:
    description: 'Version of the engine to use (tag or branch)'
    required: false
    default: 'v1.3.0'
  rules-repo:
    description: 'Repository containing the ruleset'
    required: true
    default: 'AMDphreak/evolution-rules-code'
  rules-version:
    description: 'Version of the ruleset to use'
    required: false
    default: 'v1.0.0'
  rules-dir:
    description: 'Path to the rules directory within the rules-repo (or URL/Archive)'
    required: false
    default: 'rules'
  library:
    description: 'Library/Binding subpath (e.g., python/PyQt)'
    required: false
    default: ''
  from:
    description: 'Starting version'
    required: true
  to:
    description: 'Target version'
    required: true
  extensions:
    description: 'File extensions to process'
    required: false
    default: '.py,.cpp,.h'
  in-place:
    description: 'Modify files in-place? (default: true)'
    required: false
    default: 'true'
  out-dir:
    description: 'Output directory for transformed files (disables in-place if set)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Dlang
      uses: dlang-community/setup-dlang@v2
      with:
        compiler: ldc-latest

    - name: Checkout Engine
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.engine-repo }}
        ref: ${{ inputs.engine-version }}
        path: evolution-engine-tool

    - name: Checkout Ruleset
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.rules-repo }}
        ref: ${{ inputs.rules-version }}
        path: evolution-rules-dir

    - name: Run Evolution Engine
      shell: bash
      run: |
        CMD="./evolution-engine-tool/bin/evolution-engine --path '${{ inputs.path }}'"
        
        # Build rules source
        # If rules-dir starts with http, use it directly as rules-dir
        if [[ "${{ inputs.rules-dir }}" == http* ]]; then
          CMD="$CMD --rules-dir '${{ inputs.rules-dir }}'"
        else
          CMD="$CMD --rules-dir 'evolution-rules-dir/${{ inputs.rules-dir }}'"
        fi

        CMD="$CMD --from '${{ inputs.from }}' --to '${{ inputs.to }}' --extensions '${{ inputs.extensions }}'"
        
        if [ -n "${{ inputs.library }}" ]; then
          CMD="$CMD --library '${{ inputs.library }}'"
        fi

        if [ -n "${{ inputs.out-dir }}" ]; then
          CMD="$CMD --out-dir '${{ inputs.out-dir }}'"
        elif [ "${{ inputs.in-place }}" == "true" ]; then
          CMD="$CMD --in-place"
        fi

        # Build the engine if binary doesn't exist
        if [ ! -f ./evolution-engine-tool/bin/evolution-engine ]; then
          cd evolution-engine-tool && dub build -b release && cd ..
        fi

        eval $CMD
